<!doctype html>
<html lang="en">
	<head>
		<meta charset="utf-8" />
		<meta http-equiv="X-UA-Compatible" content="IE=edge,chrome=1" />
		<title>Web Notifications Example</title>
		<link rel="icon" type="image/x-icon" href="../favicon.ico" />
		<meta name="description" content="" />
		<meta name="viewport" content="width=device-width, initial-scale=1" />
		<link rel="stylesheet" href="../style/core-web-styles.css" />
		<link rel="stylesheet" href="../common/style/app.css" />
		<script defer="defer" src="../js/provider.bundle.js"></script>
		<link rel="manifest" href="../manifest.json" />
	</head>
	<body class="provider-shell">
		<header class="row spread middle header">
			<div class="col">
				<h1>Web Notifications Example</h1>
				<h1 class="tag">Demonstrate interacting with notifications.</h1>
			</div>
			<img src="../common/images/here.png" alt="HERE" height="40" />
		</header>
		<main id="main-page">
			<div id="layout_container" class="fill"></div>
		</main>
		<aside
				id="notification_sidebar"
				class="enterprise-sidebar"
				aria-label="Notification sidebar"
				data-open="true"
			>
				<div
					id="notification_center_container"
					class="enterprise-notification-center"
					aria-label="Notification center"
				></div>
			</aside>
		<div id="notification_toast_container" aria-label="Notification toasts"></div>
	</body>
</html>
